<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 640" font-family="Georgia, serif">
  <style>
    .stone{fill:#efe7d2;stroke:#3a2f25;stroke-width:3}
    .lean{fill:#efe7d2;stroke:#3a2f25;stroke-width:3}
    .rno{font-size:16px;font-weight:bold;fill:#7a2d12}
    .lbl{font-size:11px;fill:#4a3d2e}
    .t{font-size:18px;font-weight:bold;fill:#3a2f25}
    .sub{font-size:10px;fill:#6a5a44;font-style:italic}
    .stair{stroke:#3a2f25;stroke-width:2;stroke-dasharray:4 3}
    .flame{fill:#bcdcff;stroke:#5b86c4;stroke-width:2}
    .leg{font-size:10px;fill:#3a2f25}
  </style>
  <rect width="560" height="640" fill="#f7efd9"/>
  <text x="24" y="30" class="t">THE CROOKSPIRE — DM cross-section</text>
  <text x="24" y="48" class="sub">road-warden's watchtower, Wendwater ford-road · ~3h S of Wend · light, solo lvl 1</text>

  <!-- ground -->
  <rect x="150" y="430" width="180" height="90" class="stone"/>
  <text x="166" y="455" class="rno">1</text><text x="166" y="472" class="lbl">Ground / Guardroom</text>
  <text x="166" y="488" class="lbl">arrow-slits · loose flag (12gp)</text>
  <rect x="138" y="470" width="14" height="26" fill="#efe7d2" stroke="#3a2f25" stroke-width="2"/>
  <text x="92" y="488" class="lbl">gate→</text>

  <!-- cellar -->
  <path d="M165 520 h150 l-14 70 h-122 z" class="stone"/>
  <text x="196" y="548" class="rno">2</text><text x="196" y="565" class="lbl">Cellar — kobold den</text>
  <text x="196" y="580" class="lbl">Skritt+4 · 3 rats · hoard</text>
  <line x1="240" y1="520" x2="240" y2="430" class="stair"/>
  <text x="246" y="520" class="lbl">trap-stair</text>

  <!-- warden -->
  <rect x="150" y="335" width="180" height="90" class="stone"/>
  <text x="166" y="360" class="rno">3</text><text x="166" y="377" class="lbl">Warden's floor — Mip</text>
  <text x="166" y="393" class="lbl">loose stone: 30gp, garnet,</text>
  <text x="166" y="408" class="lbl">scroll of SHIELD (MU1)</text>

  <!-- store -->
  <rect x="150" y="240" width="180" height="90" class="stone"/>
  <text x="166" y="265" class="rno">4</text><text x="166" y="282" class="lbl">Store / armoury</text>
  <text x="166" y="298" class="lbl">rot · 3 jars lamp-oil</text>
  <text x="166" y="314" class="lbl">(floor above failing)</text>

  <!-- crown (leaning) -->
  <path d="M150 235 l185 -8 l-10 -110 l-150 12 z" class="lean"/>
  <text x="196" y="150" class="rno">5</text><text x="186" y="168" class="lbl">CROWN / beacon</text>
  <text x="186" y="184" class="lbl">2 stirges · UNSAFE floor</text>
  <text x="186" y="200" class="lbl">(fall 2d6) · cold blue flame</text>
  <circle cx="305" cy="150" r="12" class="flame"/>
  <text x="286" y="120" class="lbl">cold beacon</text>

  <!-- spine stair -->
  <line x1="240" y1="430" x2="240" y2="335" class="stair"/>
  <line x1="240" y1="335" x2="240" y2="240" class="stair"/>
  <line x1="240" y1="240" x2="245" y2="150" class="stair"/>
  <text x="248" y="335" class="lbl">stair ↑</text>

  <!-- legend -->
  <text x="360" y="430" class="leg" font-weight="bold">Threats (pre-rolled HP):</text>
  <text x="360" y="448" class="leg">Skritt kobold hp4; kobolds hp 4,3,1,1</text>
  <text x="360" y="464" class="leg">giant rats hp 2,4,4</text>
  <text x="360" y="480" class="leg">stirges hp 9, 4 (blood-drain)</text>
  <text x="360" y="500" class="leg" font-weight="bold">The lesson:</text>
  <text x="360" y="516" class="leg">Sleep folds the kobolds. The crown</text>
  <text x="360" y="532" class="leg">(stirges + collapsing floor) is the</text>
  <text x="360" y="548" class="leg">"withdraw and live" test — skip it.</text>
  <text x="360" y="572" class="leg" font-weight="bold">Strange thing:</text>
  <text x="360" y="588" class="leg">the self-lighting cold beacon (5).</text>
  <text x="360" y="604" class="leg">Never explained. Hides nothing.</text>
  <text x="24" y="624" class="sub">⚠ DM-ONLY. Reveal only what the character perceives.</text>
</svg>
