<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 990 594" font-family="Georgia,serif"><rect width="100%" height="100%" fill="#efe7d2"/><text x="40" y="26" font-size="20" font-weight="bold" fill="#6b2b1f">The Leaning Tower</text><text x="40" y="42" font-size="11" font-style="italic" fill="#2b2118">A room-graph delve · levels 1-3 · arc: pale-lamp</text><line x1="495.0" y1="125.0" x2="495.0" y2="255.0" stroke="#2b2118" stroke-width="2" stroke-dasharray="none"/><line x1="495.0" y1="125.0" x2="875.0" y2="385.0" stroke="#2f6f93" stroke-width="2" stroke-dasharray="1,4"/><rect x="659.6" y="246.0" width="50.800000000000004" height="13" rx="2" fill="#efe7d2" opacity="0.92"/><text x="685.0" y="256.5" font-size="9" text-anchor="middle" fill="#2f6f93">chute H</text><line x1="495.0" y1="255.0" x2="115.0" y2="255.0" stroke="#2b2118" stroke-width="2" stroke-dasharray="none"/><line x1="495.0" y1="255.0" x2="495.0" y2="385.0" stroke="#9c3322" stroke-width="2" stroke-dasharray="4,3"/><rect x="469.6" y="311.0" width="50.800000000000004" height="13" rx="2" fill="#efe7d2" opacity="0.92"/><text x="495.0" y="321.5" font-size="9" text-anchor="middle" fill="#9c3322">stair T</text><line x1="115.0" y1="255.0" x2="115.0" y2="385.0" stroke="#7a5a1e" stroke-width="2" stroke-dasharray="6,4"/><rect x="89.6" y="311.0" width="50.800000000000004" height="13" rx="2" fill="#efe7d2" opacity="0.92"/><text x="115.0" y="321.5" font-size="9" text-anchor="middle" fill="#7a5a1e">door LH</text><line x1="495.0" y1="385.0" x2="115.0" y2="385.0" stroke="#9c3322" stroke-width="2" stroke-dasharray="4,3"/><rect x="282.8" y="376.0" width="44.400000000000006" height="13" rx="2" fill="#efe7d2" opacity="0.92"/><text x="305.0" y="386.5" font-size="9" text-anchor="middle" fill="#9c3322">door T</text><line x1="495.0" y1="385.0" x2="875.0" y2="385.0" stroke="#2b2118" stroke-width="2" stroke-dasharray="none"/><line x1="495.0" y1="385.0" x2="495.0" y2="515.0" stroke="#7a5a1e" stroke-width="2" stroke-dasharray="6,4"/><rect x="479.2" y="441.0" width="31.6" height="13" rx="2" fill="#efe7d2" opacity="0.92"/><text x="495.0" y="451.5" font-size="9" text-anchor="middle" fill="#7a5a1e">door</text><line x1="875.0" y1="385.0" x2="875.0" y2="515.0" stroke="#2b2118" stroke-width="2" stroke-dasharray="none"/><line x1="875.0" y1="385.0" x2="495.0" y2="515.0" stroke="#2f6f93" stroke-width="2" stroke-dasharray="1,4"/><rect x="659.6" y="441.0" width="50.800000000000004" height="13" rx="2" fill="#efe7d2" opacity="0.92"/><text x="685.0" y="451.5" font-size="9" text-anchor="middle" fill="#2f6f93">grate H</text><rect x="420.0" y="86.0" width="150.0" height="78.0" rx="7" fill="#bcd9a6" stroke="#b8a578" stroke-width="1.5" data-room="threshold" data-name="The Tilted Threshold" data-exits="stair|doorway|; flooded|chute|hidden" data-flags="entrance,clue:lintel-glyph" data-contents="The cracked ground-floor doorway. The whole tower leans a good twenty degrees, so the flagstone floor slopes toward the north wall. Carved into the lintel is a faintly warm glyph (a WARD, not a curse -- a clue). A dead Boneland scavenger lies against the rubble, two months gone."/><text x="495.0" y="102.0" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b2b1f">The Tilted Threshold</text><text x="495.0" y="118.0" font-size="8.5" text-anchor="middle" fill="#2b2118">entrance clue:lintel-glyph</text><text x="495.0" y="158.0" font-size="7.5" text-anchor="middle" fill="#8a7a5a" font-style="italic">threshold</text><rect x="420.0" y="216.0" width="150.0" height="78.0" rx="7" fill="#f4eeda" stroke="#b8a578" stroke-width="1.5" data-room="stair" data-name="The Leaning Stair" data-exits="threshold|doorway|; gallery|landing|; glyph_hall|stair|trapped" data-flags="trap" data-contents="A spiral stair canted hard by the tower's tilt; several steps are cracked or missing. It serves a landing (the gallery) and continues down into the lower vault."/><text x="495.0" y="232.0" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b2b1f">The Leaning Stair</text><text x="495.0" y="248.0" font-size="8.5" text-anchor="middle" fill="#2b2118">trap</text><text x="495.0" y="288.0" font-size="7.5" text-anchor="middle" fill="#8a7a5a" font-style="italic">stair</text><rect x="40.0" y="216.0" width="150.0" height="78.0" rx="7" fill="#f4eeda" stroke="#b8a578" stroke-width="1.5" data-room="gallery" data-name="The Warden's Gallery" data-exits="stair|landing|; focus_vault|door|locked+hidden" data-flags="clue:journal-1" data-contents="A ruined study: rotted books, a cold hearth, and a faded portrait of a thin, anxious man in imperial robes -- Maerith, the tower's magus. The portrait conceals a sealed door. A torn JOURNAL PAGE survives on the desk (fragment 1 of 3): it speaks of 'the Lamp I lit to ward the march' and 'my Focus, the Seventh Sigil, lost before the rite was done.'"/><text x="115.0" y="232.0" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b2b1f">The Warden's Gallery</text><text x="115.0" y="248.0" font-size="8.5" text-anchor="middle" fill="#2b2118">foe: giant rat</text><text x="115.0" y="260.0" font-size="8.5" text-anchor="middle" fill="#2b2118">clue:journal-1</text><text x="115.0" y="288.0" font-size="7.5" text-anchor="middle" fill="#8a7a5a" font-style="italic">gallery</text><rect x="420.0" y="346.0" width="150.0" height="78.0" rx="7" fill="#f4eeda" stroke="#b8a578" stroke-width="1.5" data-room="glyph_hall" data-name="The Glyph Hall" data-exits="stair|stair|trapped; focus_vault|door|trapped; flooded|passage|; lamp_chamber|door|" data-flags="trap:wild-magic,clue:journal-2" data-contents="A low vault-corridor. The floor is inlaid with a great imperial rune that flares when crossed -- a wild-magic surge trap, side-effect of the Lamp's unbalanced burn. A second JOURNAL PAGE is pinned under a fallen sconce (fragment 2): 'the Lamp no longer holds anything back -- it FEEDS. I cannot stop it without the Sigil and the rite's last line.'"/><text x="495.0" y="362.0" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b2b1f">The Glyph Hall</text><text x="495.0" y="378.0" font-size="8.5" text-anchor="middle" fill="#2b2118">trap:wild-magic clue:journal-2</text><text x="495.0" y="418.0" font-size="7.5" text-anchor="middle" fill="#8a7a5a" font-style="italic">glyph_hall</text><rect x="40.0" y="346.0" width="150.0" height="78.0" rx="7" fill="#e8cf86" stroke="#b8a578" stroke-width="1.5" data-room="focus_vault" data-name="The Focus Vault" data-exits="gallery|door|locked+hidden; glyph_hall|door|trapped" data-flags="key:seventh-sigil,trap" data-contents="A small sealed strongroom. On a black velvet stand rests the SEVENTH SIGIL -- Maerith's focus-crystal, a fist-sized quartz still humming faintly. Taking it is the KEY to ending the arc cleanly. The stand is ward-trapped."/><text x="115.0" y="362.0" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b2b1f">The Focus Vault</text><text x="115.0" y="378.0" font-size="8.5" text-anchor="middle" fill="#2b2118">key:seventh-sigil trap</text><text x="115.0" y="418.0" font-size="7.5" text-anchor="middle" fill="#8a7a5a" font-style="italic">focus_vault</text><rect x="800.0" y="346.0" width="150.0" height="78.0" rx="7" fill="#f4eeda" stroke="#b8a578" stroke-width="1.5" data-room="flooded" data-name="The Flooded Sublevel" data-exits="threshold|chute|hidden; glyph_hall|passage|; reliquary|passage|; lamp_chamber|grate|hidden" data-flags="danger:water" data-contents="The tilt sank this side of the vault below the water table; black, cold water stands waist-to-chest deep. A barnacled chest lies half-sunk in the far corner. A rusted iron grate in the floor leads deeper still."/><text x="875.0" y="362.0" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b2b1f">The Flooded Sublevel</text><text x="875.0" y="378.0" font-size="8.5" text-anchor="middle" fill="#2b2118">foe: giant frog</text><text x="875.0" y="390.0" font-size="8.5" text-anchor="middle" fill="#2b2118">danger:water</text><text x="875.0" y="418.0" font-size="7.5" text-anchor="middle" fill="#8a7a5a" font-style="italic">flooded</text><rect x="800.0" y="476.0" width="150.0" height="78.0" rx="7" fill="#f4eeda" stroke="#b8a578" stroke-width="1.5" data-room="reliquary" data-name="The Drowned Reliquary" data-exits="flooded|passage|" data-flags="clue:journal-3,danger" data-contents="A niche-lined room above the waterline, the magus's store of minor workings. A suit of imperial parade armour stands guard and animates if the relics are disturbed. The THIRD JOURNAL PAGE rests in a reliquary box (fragment 3): it records the rite's last line in full -- the words that can quench the Lamp or lay Maerith to rest."/><text x="875.0" y="492.0" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b2b1f">The Drowned Reliquary</text><text x="875.0" y="508.0" font-size="8.5" text-anchor="middle" fill="#2b2118">foe: animated armour</text><text x="875.0" y="520.0" font-size="8.5" text-anchor="middle" fill="#2b2118">clue:journal-3 danger</text><text x="875.0" y="548.0" font-size="7.5" text-anchor="middle" fill="#8a7a5a" font-style="italic">reliquary</text><rect x="420.0" y="476.0" width="150.0" height="78.0" rx="7" fill="#d8a59a" stroke="#b8a578" stroke-width="1.5" data-room="lamp_chamber" data-name="The Lamp Chamber" data-exits="glyph_hall|door|; flooded|grate|hidden" data-flags="boss,arc-climax" data-contents="The vault's heart. The PALE LAMP burns on a central plinth -- a heatless blue-white flame that throws no shadow and makes the teeth ache. Bound to it stands MAERITH THE UNFINISHED, a courteous revenant in imperial robes, certain he is still warding Halvedd from a second Sundering. He will TALK first. RESOLUTION: complete the rite with the Seventh Sigil (clean), return his Focus / speak the last line to lay him to rest, or talk him down -- smashing the Lamp works but triggers an honest wild-magic backlash. See canon 'pale-lamp'."/><text x="495.0" y="492.0" font-size="11" font-weight="bold" text-anchor="middle" fill="#6b2b1f">The Lamp Chamber</text><text x="495.0" y="508.0" font-size="8.5" text-anchor="middle" fill="#2b2118">foe: Maerith the Unfinished</text><text x="495.0" y="520.0" font-size="8.5" text-anchor="middle" fill="#2b2118">boss</text><text x="495.0" y="548.0" font-size="7.5" text-anchor="middle" fill="#8a7a5a" font-style="italic">lamp_chamber</text><text x="40" y="578" font-size="9" fill="#2b2118">edges: — passage/stair · - - door (L lock, H hidden) · ·· grate/chute · red = trapped</text></svg>