<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Georgia, serif">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#e7dcc3" stroke-width="0.6"/>
    </pattern>
    <style>
      .wall{fill:none;stroke:#3a2f25;stroke-width:5;stroke-linejoin:round}
      .room{fill:#fbf4e2;stroke:#3a2f25;stroke-width:3}
      .keep{fill:#f6e7d2;stroke:#3a2f25;stroke-width:3}
      .rno{font-size:15px;font-weight:bold;fill:#7a2d12}
      .rlbl{font-size:9.5px;fill:#4a3d2e}
      .title{font-size:20px;font-weight:bold;fill:#3a2f25}
      .sub{font-size:11px;fill:#6a5a44;font-style:italic}
      .leg{font-size:10px;fill:#3a2f25}
      .water{fill:#cfe3ea;opacity:.7}
      .door{stroke:#3a2f25;stroke-width:3}
    </style>
  </defs>
  <rect width="1000" height="720" fill="#f7efd9"/>
  <rect width="1000" height="720" fill="url(#grid)"/>
  <text x="28" y="34" class="title">HARROWGATE KEEP — DM Map (B1/B2, 4th level)</text>
  <text x="28" y="52" class="sub">Old march toll-keep on a ridge above a river ford · ~a day+ E of Wend · river-wall flood-breached</text>

  <!-- ===== SURFACE ===== -->
  <text x="40" y="86" class="leg" font-weight="bold">SURFACE (curtain wall &amp; bailey)</text>
  <rect x="60" y="96" width="520" height="470" class="wall"/>
  <!-- gate gap south -->
  <rect x="290" y="562" width="50" height="8" fill="#f7efd9"/>
  <text x="250" y="588" class="rlbl">east road / ford ↓</text>

  <!-- 1 Gatehouse (south) -->
  <rect x="270" y="500" width="100" height="64" class="room"/>
  <text x="286" y="524" class="rno">1</text><text x="272" y="556" class="rlbl">Gatehouse · portcullis</text>
  <text x="272" y="568" class="rlbl">(toll-treasury bricked in)</text>

  <!-- 6 Captives' cell (by gate) -->
  <rect x="150" y="500" width="100" height="64" class="room"/>
  <text x="166" y="524" class="rno">6</text><text x="152" y="556" class="rlbl">Captives' cell (Oren)</text>

  <!-- 7 Stables/forge -->
  <rect x="390" y="500" width="120" height="64" class="room"/>
  <text x="406" y="524" class="rno">7</text><text x="392" y="556" class="rlbl">Stables &amp; forge</text>

  <!-- 2 Bailey (center) -->
  <rect x="150" y="250" width="250" height="220" class="room" fill="#eef0e0"/>
  <text x="262" y="350" class="rno">2</text><text x="190" y="368" class="rlbl">Bailey (drill-ground)</text>
  <circle cx="200" cy="420" r="9" fill="none" stroke="#3a2f25" stroke-width="2"/><text x="188" y="446" class="rlbl">well</text>

  <!-- 8 Shrine (off bailey) -->
  <rect x="150" y="170" width="110" height="70" class="room"/>
  <text x="166" y="194" class="rno">8</text><text x="152" y="214" class="rlbl">Shrine (stair↓ crypt)</text>

  <!-- 14 Granary tower (in bailey) -->
  <rect x="300" y="170" width="90" height="70" class="room"/>
  <text x="316" y="194" class="rno">14</text><text x="302" y="214" class="rlbl">Granary (rats; cache)</text>

  <!-- Keep (NE block): 3 hall, 4 lord upper, 5 kitchen -->
  <rect x="410" y="120" width="150" height="160" class="keep"/>
  <text x="426" y="144" class="rno">3</text><text x="412" y="160" class="rlbl">Great Hall / Barracks</text>
  <text x="412" y="206" class="rlbl">4 Castellan's chamber ↑</text>
  <text x="412" y="220" class="rlbl">   (Grorm · warchest)</text>
  <rect x="410" y="288" width="150" height="80" class="keep"/>
  <text x="426" y="312" class="rno">5</text><text x="412" y="328" class="rlbl">Kitchens/stores</text>
  <text x="412" y="356" class="rlbl">↓ cellars</text>

  <!-- 9 NE crumbled tower (breach) -->
  <rect x="540" y="96" width="44" height="44" fill="#e8d9b5" stroke="#3a2f25" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="588" y="120" class="rlbl">9 crumbled tower (climb-in)</text>

  <!-- ===== UNDERCROFT (flooded) ===== -->
  <text x="640" y="86" class="leg" font-weight="bold">UNDERCROFT (flooded)</text>
  <rect x="636" y="96" width="330" height="430" fill="#e9eef0" stroke="#3a2f25" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="640" y="100" width="322" height="422" class="water"/>

  <!-- 10 cellars/cistern head -->
  <rect x="660" y="120" width="150" height="100" class="room"/>
  <text x="676" y="144" class="rno">10</text><text x="662" y="162" class="rlbl">Cellars / cistern-head</text>

  <!-- 15 river-wall breach (exterior, right) -->
  <rect x="830" y="120" width="120" height="80" class="room" fill="#dceef2"/>
  <text x="846" y="144" class="rno">15</text><text x="832" y="162" class="rlbl">River-wall BREACH</text>
  <text x="832" y="176" class="rlbl">(wade in from river)</text>

  <!-- 11 flooded undercroft -->
  <rect x="660" y="240" width="180" height="110" class="room" fill="#cfe3ea"/>
  <text x="676" y="264" class="rno">11</text><text x="662" y="282" class="rlbl">Flooded undercroft</text>
  <text x="662" y="296" class="rlbl">(ghouls hunt)</text>

  <!-- 12 crypt -->
  <rect x="660" y="368" width="180" height="110" class="room"/>
  <text x="676" y="392" class="rno">12</text><text x="662" y="410" class="rlbl">Castellan's CRYPT</text>
  <text x="662" y="424" class="rlbl">founder tomb · WARDFFAN +1</text>
  <text x="662" y="438" class="rlbl">5 ghouls</text>

  <!-- 13 sally-port drain -->
  <rect x="860" y="368" width="90" height="110" class="room" fill="#dceef2"/>
  <text x="876" y="392" class="rno">13</text><text x="862" y="410" class="rlbl">Sally-port /</text>
  <text x="862" y="424" class="rlbl">cistern drain</text>
  <text x="862" y="452" class="rlbl">→ riverbank</text>

  <line x1="810" y1="160" x2="830" y2="160" class="door"/>
  <line x1="745" y1="220" x2="745" y2="240" class="door" stroke-dasharray="4 3"/>
  <line x1="745" y1="350" x2="745" y2="368" class="door" stroke-dasharray="4 3"/>
  <line x1="840" y1="420" x2="860" y2="420" class="door"/>

  <!-- legend -->
  <text x="40" y="612" class="leg" font-weight="bold">Factions:</text>
  <text x="40" y="628" class="leg">A) Hobgoblin Fang (gate/bailey/keep) — Sub-chief Grorm + elites</text>
  <text x="40" y="644" class="leg">B) The Drowned Dead — ghouls in the flooded undercroft/crypt (11,12)</text>
  <text x="40" y="660" class="leg">C) Captives — merchant Oren Pelk + 2 servants (rm6)</text>
  <text x="40" y="680" class="leg">Strange feature: Wardffan, +1 sword in the founder's tomb (12).</text>
  <text x="540" y="628" class="leg">Approaches: gate · climb crumbled NE tower (9) · river-wall</text>
  <text x="540" y="644" class="leg">breach (15→10/11) · cistern drain (13) · shrine stair (8→12)</text>
  <text x="540" y="664" class="leg">Elves immune to ghoul paralysis.</text>
  <text x="540" y="684" class="leg">⚠ DM-ONLY. Reveal only what the party discovers.</text>
</svg>
