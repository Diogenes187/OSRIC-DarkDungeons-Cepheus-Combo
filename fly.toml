# fly.toml app configuration file generated for tkw-dnd on 2026-06-25T19:46:51-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tkw-dnd'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  GREYHAWK_CAMPAIGN_ID = '1'
  GREYHAWK_MCP_DB = '/data/campaign.db'
  GREYHAWK_MCP_NAME = 'tkw-dnd'
  GREYHAWK_VALIDATOR_PROVIDER = 'deepseek'
  BASE_URL = 'https://tkw-dnd.fly.dev'

[[mounts]]
  source = 'tkw_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.http_options]
    [http_service.http_options.response]
      pristine = true

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
